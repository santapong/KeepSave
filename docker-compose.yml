services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keepsave
      POSTGRES_PASSWORD: keepsave_dev
      POSTGRES_DB: keepsave
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://keepsave:keepsave_dev@db:5432/keepsave?sslmode=disable
      MASTER_KEY: dGhpcy1pcy1hLTMyLWJ5dGUtZGV2LWtleS4u
      JWT_SECRET: dev-jwt-secret-change-me
      PORT: "8080"
      CORS_ORIGINS: "*"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
