version: 2
updates:
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, go]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, frontend]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: npm
    directory: /sdks/nodejs
    schedule:
      interval: weekly
    labels: [dependencies, sdk-nodejs]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: pip
    directory: /sdks/python
    schedule:
      interval: weekly
    labels: [dependencies, sdk-python]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies, docker]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    labels: [dependencies, docker]
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    commit-message:
      prefix: chore(ci)
