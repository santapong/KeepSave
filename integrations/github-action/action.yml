name: 'KeepSave Secrets'
description: 'Pull secrets from KeepSave and inject them as environment variables or files'
author: 'KeepSave'

branding:
  icon: 'lock'
  color: 'blue'

inputs:
  api-url:
    description: 'KeepSave API URL'
    required: true
  api-key:
    description: 'KeepSave API key'
    required: true
  project-id:
    description: 'KeepSave project ID'
    required: true
  environment:
    description: 'Target environment (alpha, uat, prod)'
    required: true
    default: 'alpha'
  export-to:
    description: 'Export format: env (environment variables), file (.env file), json (JSON file)'
    required: false
    default: 'env'
  env-file-path:
    description: 'Path for .env file output (when export-to is file)'
    required: false
    default: '.env'

outputs:
  secrets-count:
    description: 'Number of secrets pulled'

runs:
  using: 'composite'
  steps:
    - name: Pull secrets from KeepSave
      shell: bash
      env:
        KEEPSAVE_API_URL: ${{ inputs.api-url }}
        KEEPSAVE_API_KEY: ${{ inputs.api-key }}
      run: |
        # Pull secrets from KeepSave API
        RESPONSE=$(curl -sf \
          -H "X-API-Key: ${KEEPSAVE_API_KEY}" \
          -H "Content-Type: application/json" \
          "${KEEPSAVE_API_URL}/api/v1/projects/${{ inputs.project-id }}/secrets?environment=${{ inputs.environment }}")

        if [ $? -ne 0 ]; then
          echo "::error::Failed to pull secrets from KeepSave"
          exit 1
        fi

        # Count secrets
        COUNT=$(echo "$RESPONSE" | jq '.secrets | length')
        echo "secrets-count=$COUNT" >> $GITHUB_OUTPUT
        echo "Pulled $COUNT secrets from KeepSave (${{ inputs.environment }})"

        case "${{ inputs.export-to }}" in
          env)
            # Export as environment variables
            echo "$RESPONSE" | jq -r '.secrets[] | "\(.key)=\(.value)"' >> $GITHUB_ENV
            echo "Secrets exported as environment variables"
            ;;
          file)
            # Write to .env file
            echo "# Generated by KeepSave GitHub Action" > "${{ inputs.env-file-path }}"
            echo "# Environment: ${{ inputs.environment }}" >> "${{ inputs.env-file-path }}"
            echo "" >> "${{ inputs.env-file-path }}"
            echo "$RESPONSE" | jq -r '.secrets[] | "\(.key)=\(.value)"' >> "${{ inputs.env-file-path }}"
            echo "Secrets written to ${{ inputs.env-file-path }}"
            ;;
          json)
            # Write as JSON file
            echo "$RESPONSE" | jq '.secrets | map({(.key): .value}) | add' > "${{ inputs.env-file-path }}.json"
            echo "Secrets written to ${{ inputs.env-file-path }}.json"
            ;;
        esac
