# KeepSave GitLab CI/CD Integration
# Include this template in your .gitlab-ci.yml:
#   include:
#     - project: 'santapong/keepsave-integrations'
#       file: '/gitlab-ci/keepsave.gitlab-ci.yml'
#
# Required CI/CD variables:
#   KEEPSAVE_API_URL - KeepSave API URL
#   KEEPSAVE_API_KEY - KeepSave API key (masked)
#   KEEPSAVE_PROJECT_ID - KeepSave project ID

.keepsave-pull:
  before_script:
    - |
      echo "Pulling secrets from KeepSave..."
      KEEPSAVE_ENV="${KEEPSAVE_ENVIRONMENT:-alpha}"

      RESPONSE=$(curl -sf \
        -H "X-API-Key: ${KEEPSAVE_API_KEY}" \
        -H "Content-Type: application/json" \
        "${KEEPSAVE_API_URL}/api/v1/projects/${KEEPSAVE_PROJECT_ID}/secrets?environment=${KEEPSAVE_ENV}")

      if [ $? -ne 0 ]; then
        echo "ERROR: Failed to pull secrets from KeepSave"
        exit 1
      fi

      # Export as environment variables
      eval $(echo "$RESPONSE" | python3 -c "
      import sys, json
      data = json.load(sys.stdin)
      for s in data.get('secrets', []):
          key = s['key']
          val = s['value'].replace(\"'\", \"'\\\"'\\\"'\")
          print(f\"export {key}='{val}'\")
      ")

      COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('secrets',[])))")
      echo "Pulled ${COUNT} secrets from KeepSave (${KEEPSAVE_ENV})"

.keepsave-pull-to-file:
  before_script:
    - |
      echo "Pulling secrets from KeepSave to .env file..."
      KEEPSAVE_ENV="${KEEPSAVE_ENVIRONMENT:-alpha}"
      ENV_FILE="${KEEPSAVE_ENV_FILE:-.env}"

      RESPONSE=$(curl -sf \
        -H "X-API-Key: ${KEEPSAVE_API_KEY}" \
        -H "Content-Type: application/json" \
        "${KEEPSAVE_API_URL}/api/v1/projects/${KEEPSAVE_PROJECT_ID}/secrets?environment=${KEEPSAVE_ENV}")

      if [ $? -ne 0 ]; then
        echo "ERROR: Failed to pull secrets from KeepSave"
        exit 1
      fi

      echo "# Generated by KeepSave GitLab CI" > "${ENV_FILE}"
      echo "# Environment: ${KEEPSAVE_ENV}" >> "${ENV_FILE}"
      echo "" >> "${ENV_FILE}"
      echo "$RESPONSE" | python3 -c "
      import sys, json
      data = json.load(sys.stdin)
      for s in data.get('secrets', []):
          val = s['value']
          if any(c in val for c in ' #\"\\''):
              val = '\"' + val.replace('\"', '\\\\\"') + '\"'
          print(f\"{s['key']}={val}\")
      " >> "${ENV_FILE}"
      echo "Secrets written to ${ENV_FILE}"

.keepsave-promote:
  script:
    - |
      echo "Promoting secrets: ${KEEPSAVE_FROM:-alpha} -> ${KEEPSAVE_TO:-uat}..."

      RESPONSE=$(curl -sf -X POST \
        -H "Authorization: Bearer ${KEEPSAVE_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "{\"source_environment\": \"${KEEPSAVE_FROM:-alpha}\", \"target_environment\": \"${KEEPSAVE_TO:-uat}\", \"override_policy\": \"overwrite\"}" \
        "${KEEPSAVE_API_URL}/api/v1/projects/${KEEPSAVE_PROJECT_ID}/promote")

      if [ $? -ne 0 ]; then
        echo "ERROR: Failed to promote secrets"
        exit 1
      fi

      echo "Promotion complete!"
      echo "$RESPONSE" | python3 -m json.tool
